spring:
  application:
    name: WebCBD

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/webcbd?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    show-sql: true

  sql:
    init:
      mode: always

server:
  port: 8082

security:
  jwt:
    secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3Itd2ViY2JkLWp3dC0yMDI2LTAzLTA5}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
