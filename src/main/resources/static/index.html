<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCBD Storefront</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero-section">
            <nav class="navbar py-3">
                <div class="container d-flex align-items-center justify-content-between">
                    <a class="navbar-brand brand-mark" href="/">WebCBD</a>
                    <div class="auth-slot">
                        <button class="admin-entry js-admin-toggle d-none" type="button" aria-label="Admin products" aria-controls="adminProductsModal">
                            <span class="admin-icon" aria-hidden="true">
                                <span class="glyphicon glyphicon-list-alt"></span>
                            </span>
                        </button>
                        <button class="login-entry js-auth-action" type="button" aria-label="Login" data-bs-toggle="modal" data-bs-target="#loginModal" aria-controls="loginModal">
                            <span class="login-icon" aria-hidden="true">
                                <span class="glyphicon glyphicon-log-in"></span>
                            </span>
                            <span class="login-text">Login</span>
                        </button>
                    </div>
                </div>
            </nav>
        </header>

        <main class="catalog-main">
            <section class="container category-nav-wrap" id="category-nav">
                <div class="section-heading">
                    <div>
                        <p class="section-kicker">Shop by category</p>
                        <h2>Product catalog</h2>
                    </div>
                </div>
                <div id="category-pills" class="category-pills"></div>
            </section>

            <section class="container">
                <div class="row g-4">
                    <div class="col-xl-8">
                        <div id="catalog-state" class="catalog-state card shadow-sm border-0">
                            <div class="card-body p-4 p-lg-5 text-center">
                                <div class="spinner-border text-warning" role="status" aria-hidden="true"></div>
                                <p class="mt-3 mb-0">Loading products...</p>
                            </div>
                        </div>
                        <div id="catalog-sections" class="catalog-sections"></div>
                    </div>

                    <div class="col-xl-4">
                        <aside class="cart-sidebar sticky-xl-top">
                            <div class="cart-card">
                            <div class="cart-card-header">
                                    <h3 class="mb-0"><span class="glyphicon glyphicon-shopping-cart me-2" aria-hidden="true"></span>CART</h3>
                                    <span class="cart-pill" id="cart-sidebar-count">0 items</span>
                                </div>
                                <div id="cart-items" class="cart-items">
                                    <p class="empty-cart-message mb-0">Cart Empty</p>
                                </div>
                                <div class="cart-total">
                                    <span class="cart-total-label">Total</span>
                                    <strong id="cart-total-amount" class="cart-total-amount">EUR0.00</strong>
                                </div>
                            </div>
                        </aside>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content login-modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title" id="loginModalLabel">LogIn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-4">Admin</p>
                    <form id="login-form" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="login-username">Username</label>
                            <input class="form-control" id="login-username" type="text" autocomplete="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="login-password">Password</label>
                            <input class="form-control" id="login-password" type="password" autocomplete="current-password" required>
                        </div>
                        <button class="btn btn-dark w-100" type="submit">LogIn</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="adminProductsModal" tabindex="-1" aria-labelledby="adminProductsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content admin-modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="adminProductsModalLabel"><span class="glyphicon glyphicon-th-large me-2" aria-hidden="true"></span>Product data</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="admin-insights">
                        <div class="admin-insights-header">
                            <div>
                                <p class="text-muted small mb-1">Catalog snapshot</p>
                                <h6 class="mb-0"><span class="glyphicon glyphicon-stats me-2" aria-hidden="true"></span>Category mix</h6>
                            </div>
                            <span class="badge text-bg-light" id="admin-chart-count">0 categories</span>
                        </div>
                        <div id="admin-chart-state" class="admin-chart-state d-none"></div>
                        <div class="admin-chart-wrapper">
                            <canvas id="categoryChart" height="180" aria-label="Products by category"></canvas>
                        </div>
                    </div>
                    <div id="admin-products-state" class="admin-state d-none"></div>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle admin-products-table d-none" id="admin-products-table">
                            <thead>
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Name</th>
                                    <th scope="col">Category</th>
                                    <th scope="col">Price</th>
                                    <th scope="col">Description</th>
                                </tr>
                            </thead>
                            <tbody id="admin-products-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="app-toast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message">Ready.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/assets/js/app.js"></script>
</body>
</html>
